<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店铺管理 — Ozon 数据日报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','PingFang SC',system-ui,sans-serif;background:#0f1923;color:#e0e6ed;min-height:100vh}
.header{background:#1a2d3d;border-bottom:1px solid #2a3f52;padding:16px 32px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;color:#fff}
.header .nav a{color:#4fc3f7;text-decoration:none;font-size:14px;margin-left:16px;cursor:pointer}
.header .nav a:hover{color:#81d4fa}
.container{max-width:1200px;margin:0 auto;padding:24px 32px}

/* 空状态 */
.empty-state{text-align:center;padding:80px 20px;color:#6c8a9e}
.empty-state .icon{font-size:64px;margin-bottom:16px}
.empty-state h2{font-size:22px;color:#e0e6ed;margin-bottom:8px}
.empty-state p{font-size:14px;margin-bottom:24px}
.empty-state .btn{display:inline-block;padding:10px 24px;border-radius:8px;border:none;background:#ff8c00;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.empty-state .btn:hover{background:#e67e00}

/* 店铺卡片 */
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:24px}
.store-card{background:#1a2d3d;border-radius:12px;padding:20px;border:1px solid #2a3f52;position:relative}
.store-card .store-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.store-card .store-name{font-size:16px;font-weight:600;color:#fff}
.store-card .store-id{font-size:12px;color:#4a6a80;font-family:monospace}
.store-card .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.store-card .status-dot.active{background:#66bb6a}
.store-card .status-dot.disabled{background:#6c8a9e}
.store-card .field{margin-bottom:8px;font-size:13px}
.store-card .field label{color:#6c8a9e;display:inline-block;width:80px}
.store-card .field span{color:#e0e6ed;word-break:break-all}
.store-card .actions{margin-top:12px;padding-top:12px;border-top:1px solid #2a3f52;display:flex;gap:8px}
.store-card .actions button{padding:6px 14px;border-radius:6px;border:none;font-size:12px;cursor:pointer;transition:background .2s}
.store-card .actions .edit-btn{background:#2a3f52;color:#4fc3f7}
.store-card .actions .edit-btn:hover{background:#3a5a70}
.store-card .actions .delete-btn{background:#3d1a1a;color:#ff5252}
.store-card .actions .delete-btn:hover{background:#5a2828}
.store-card .actions .toggle-btn{background:#2a3f52;color:#e0e6ed}
.store-card .actions .toggle-btn:hover{background:#3a5a70}
.store-card .schedule-badge{position:absolute;top:20px;right:20px;background:#2a3f52;color:#ffa726;font-size:11px;padding:3px 10px;border-radius:12px}

/* 添加按钮 */
.add-bar{display:flex;justify-content:center;margin-bottom:24px}
.add-btn{padding:10px 28px;border-radius:8px;border:1px dashed #4a6a80;background:transparent;color:#4fc3f7;font-size:14px;cursor:pointer;transition:all .2s}
.add-btn:hover{background:#1a2d3d;border-color:#4fc3f7}

/* 弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1a2d3d;border-radius:16px;padding:32px;border:1px solid #2a3f52;width:520px;max-width:90vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:20px;color:#fff;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:#8899aa;margin-bottom:4px}
.form-group input{width:100%;padding:9px 12px;border-radius:6px;border:1px solid #2a3f52;background:#0f1923;color:#e0e6ed;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#ff8c00}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:12px;margin-top:24px;justify-content:flex-end}
.modal-actions .btn-cancel{padding:9px 20px;border-radius:6px;border:1px solid #2a3f52;background:transparent;color:#6c8a9e;cursor:pointer}
.modal-actions .btn-cancel:hover{color:#e0e6ed}
.modal-actions .btn-save{padding:9px 20px;border-radius:6px;border:none;background:#ff8c00;color:#fff;font-weight:600;cursor:pointer}
.modal-actions .btn-save:hover{background:#e67e00}
.modal-actions .btn-save:disabled{opacity:.5;cursor:not-allowed}
.form-group .hint{font-size:11px;color:#4a6a80;margin-top:2px}
.form-group .required::after{content:' *';color:#ff5252}
</style>
</head>
<body>
<div class="header">
  <h1>🧡 店铺管理</h1>
  <div class="nav">
    <a onclick="goBack()">← 返回仪表盘</a>
    <a onclick="logout()">退出登录</a>
  </div>
</div>
<div class="container" id="app">
  <div id="loading" style="text-align:center;padding:80px 0;color:#6c8a9e;font-size:16px">加载中...</div>
</div>

<!-- 添加/编辑弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">添加店铺</h2>
    <div class="form-group">
      <label>店铺ID（自动生成）</label>
      <input type="text" id="f_store_id" readonly style="color:#6c8a9e;background:#152230;" autocomplete="off">
      <div class="hint">添加时自动编号，不可修改</div>
    </div>
    <div class="form-group">
      <label class="required">店铺名称</label>
      <input type="text" id="f_name" placeholder="如: 店铺8">
    </div>
    <div class="form-group">
      <label class="required">Client ID</label>
      <input type="text" id="f_client_id" placeholder="Ozon API Client ID">
    </div>
    <div class="form-group">
      <label class="required">API Key</label>
      <input type="password" id="f_api_key" placeholder="Ozon Seller API Key">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="required">Performance Client ID</label>
        <input type="text" id="f_perf_cid" placeholder="广告API Client ID">
      </div>
      <div class="form-group">
        <label class="required">Performance Secret</label>
        <input type="password" id="f_perf_secret" placeholder="广告API Secret">
      </div>
    </div>
    <div class="form-group">
      <label>定时时间</label>
      <input type="time" id="f_schedule" value="08:40">
      <div class="hint">每天自动拉取数据的时间</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="saveBtn" onclick="saveStore()">保存</button>
    </div>
  </div>
</div>

<script>
let stores = [];
let editingId = null;

async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type': 'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (r.status === 401) { window.location.href = '/login'; return null; }
  const data = await r.json();
  if (data.error === 'unauthorized') { window.location.href = '/login'; return null; }
  return data;
}

async function loadStores() {
  document.getElementById('loading').style.display = 'block';
  const data = await api('GET', '/api/user/stores');
  if (!data) return;
  stores = data.stores || [];
  render();
}

function render() {
  const container = document.getElementById('app');
  
  if (stores.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🏪</div>
        <h2>暂无店铺配置</h2>
        <p>你还没有配置任何店铺。请添加店铺密钥开始使用。</p>
        <button class="btn" onclick="showAddModal()">+ 添加第一个店铺</button>
      </div>
    `;
    return;
  }

  let html = '<div class="add-bar"><button class="add-btn" onclick="showAddModal()">+ 添加店铺</button></div>';
  html += '<div class="store-grid">';
  
  for (const s of stores) {
    const active = s.enabled === 1 || s.enabled === null;
    const statusClass = active ? 'active' : 'disabled';
    const statusText = active ? '启用' : '停用';
    html += `
      <div class="store-card">
        <div class="schedule-badge">🕐 ${s.schedule_time || '08:40'}</div>
        <div class="store-header">
          <div>
            <div class="store-name"><span class="status-dot ${statusClass}"></span>${escHtml(s.name)}</div>
            <div class="store-id">${escHtml(s.store_id)}</div>
          </div>
        </div>
        <div class="field"><label>Client ID</label><span>${escHtml(s.client_id)}</span></div>
        <div class="field"><label>API Key</label><span>${maskKey(s.api_key)}</span></div>
        <div class="field"><label>Perf ID</label><span>${s.perf_client_id ? escHtml(s.perf_client_id) : '-'}</span></div>
        <div class="actions">
          <button class="edit-btn" onclick="showEditModal(${s.id})">✏️ 编辑</button>
          <button class="toggle-btn" onclick="toggleStore(${s.id}, ${!active})">${active ? '⏸ 停用' : '▶️ 启用'}</button>
          <button class="delete-btn" onclick="deleteStore(${s.id}, '${escHtml(s.name)}')">🗑 删除</button>
        </div>
      </div>
    `;
  }
  
  html += '</div>';
  container.innerHTML = html;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function maskKey(key) {
  if (!key) return '-';
  if (key.length <= 8) return key;
  return key.substring(0, 4) + '…' + key.substring(key.length - 4);
}

function showAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '添加店铺';
  // 自动生成店铺ID
  const maxNum = stores.reduce((max, s) => {
    const m = s.store_id.match(/store(\d+)/);
    return m ? Math.max(max, parseInt(m[1])) : max;
  }, 0);
  document.getElementById('f_store_id').value = 'store' + (maxNum + 1);
  document.getElementById('f_name').value = '';
  document.getElementById('f_client_id').value = '';
  document.getElementById('f_api_key').value = '';
  document.getElementById('f_perf_cid').value = '';
  document.getElementById('f_perf_secret').value = '';
  document.getElementById('f_schedule').value = '08:40';
  document.getElementById('saveBtn').textContent = '添加';
  document.getElementById('modal').classList.add('show');
}

function showEditModal(id) {
  const s = stores.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑店铺';
  document.getElementById('f_store_id').value = s.store_id;
  document.getElementById('f_store_id').disabled = true;
  document.getElementById('f_name').value = s.name;
  document.getElementById('f_client_id').value = s.client_id;
  document.getElementById('f_api_key').value = s.api_key;
  document.getElementById('f_perf_cid').value = s.perf_client_id || '';
  document.getElementById('f_perf_secret').value = s.perf_client_secret || '';
  document.getElementById('f_schedule').value = s.schedule_time || '08:40';
  document.getElementById('saveBtn').textContent = '保存修改';
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

async function saveStore() {
  const data = {
    store_id: document.getElementById('f_store_id').value.trim(),
    name: document.getElementById('f_name').value.trim(),
    client_id: document.getElementById('f_client_id').value.trim(),
    api_key: document.getElementById('f_api_key').value.trim(),
    perf_client_id: document.getElementById('f_perf_cid').value.trim(),
    perf_client_secret: document.getElementById('f_perf_secret').value.trim(),
    schedule_time: document.getElementById('f_schedule').value,
  };

  if (!data.store_id || !data.name || !data.client_id || !data.api_key) {
    alert('请填写必填字段（店铺ID、名称、Client ID、API Key）');
    return;
  }
  if (!data.perf_client_id || !data.perf_client_secret) {
    alert('广告API的Client ID和Secret为必填');
    return;
  }

  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveBtn').textContent = '保存中...';

  let result;
  if (editingId) {
    result = await api('POST', '/api/user/store/update', { id: editingId, ...data });
  } else {
    result = await api('POST', '/api/user/store/add', data);
  }

  document.getElementById('saveBtn').disabled = false;
  document.getElementById('saveBtn').textContent = editingId ? '保存修改' : '添加';

  if (result && result.ok) {
    closeModal();
    await loadStores();
  } else if (result) {
    alert(result.message || '保存失败');
  }
}

async function deleteStore(id, name) {
  if (!confirm(`确定要删除店铺「${name}」吗？\n此操作不可撤销。`)) return;
  const result = await api('POST', '/api/user/store/delete', { id });
  if (result && result.ok) {
    await loadStores();
  } else if (result) {
    alert(result.message || '删除失败');
  }
}

async function toggleStore(id, enabled) {
  const result = await api('POST', '/api/user/store/update', { id, enabled: enabled ? 1 : 0 });
  if (result && result.ok) {
    await loadStores();
  }
}

async function logout() {
  await api('POST', '/api/logout');
  window.location.href = '/login';
}

function goBack() {
  window.location.href = '/';
}

loadStores();
</script>
</body>
</html>
